version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eduplay_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-eduplay}
      POSTGRES_USER:     ${POSTGRES_USER:-eduplay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduplay_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduplay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduplay_net

  # ── Django backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ../eduplay-backend
    container_name: eduplay_backend
    restart: unless-stopped
    environment:
      SECRET_KEY:                   ${SECRET_KEY:-dev-secret-change-in-production}
      DEBUG:                        ${DEBUG:-False}
      DATABASE_URL:                 postgresql://${POSTGRES_USER:-eduplay}:${POSTGRES_PASSWORD:-eduplay_secret}@db:5432/${POSTGRES_DB:-eduplay}
      ALLOWED_HOSTS:                ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS:         ${CORS_ALLOWED_ORIGINS:-http://localhost}
      ACCESS_TOKEN_LIFETIME_MINUTES: ${ACCESS_TOKEN_LIFETIME_MINUTES:-60}
      REFRESH_TOKEN_LIFETIME_DAYS:   ${REFRESH_TOKEN_LIFETIME_DAYS:-7}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eduplay_net

  # ── Primary school frontend ────────────────────────────────────────────────
  primary:
    build:
      context: ../eduplay-primary
      args:
        VITE_API_URL: /api
    container_name: eduplay_primary
    restart: unless-stopped
    networks:
      - eduplay_net

  # ── Secondary school frontend ──────────────────────────────────────────────
  secondary:
    build:
      context: ../eduplay-secondary
      args:
        VITE_API_URL: /api
    container_name: eduplay_secondary
    restart: unless-stopped
    networks:
      - eduplay_net

  # ── Teacher dashboard ──────────────────────────────────────────────────────
  teacher:
    build:
      context: ../eduplay-teacher
      args:
        VITE_API_URL: /api
    container_name: eduplay_teacher
    restart: unless-stopped
    networks:
      - eduplay_net

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
    container_name: eduplay_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - primary
      - secondary
      - teacher
    volumes:
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    networks:
      - eduplay_net

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  eduplay_net:
    driver: bridge
