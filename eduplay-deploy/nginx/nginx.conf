worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Upstream services ─────────────────────────────────────────────────
    upstream backend   { server backend:8000;   }
    upstream primary   { server primary:80;     }
    upstream secondary { server secondary:80;   }
    upstream teacher   { server teacher:80;     }

    server {
        listen 80;
        server_name localhost;

        # ── Django API ─────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Django Admin ───────────────────────────────────────────────────
        location /admin/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Django static files ────────────────────────────────────────────
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Django media files ─────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # ── Secondary school frontend ──────────────────────────────────────
        location /secondary/ {
            proxy_pass       http://secondary/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Teacher dashboard ──────────────────────────────────────────────
        location /teacher/ {
            proxy_pass       http://teacher/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Primary school frontend (default, catch-all) ───────────────────
        location / {
            proxy_pass       http://primary/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
