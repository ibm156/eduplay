name: Teacher Dashboard — Build & Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'eduplay-teacher/**'
      - '.github/workflows/teacher.yml'
  pull_request:
    branches: [main]
    paths:
      - 'eduplay-teacher/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/eduplay-teacher

jobs:

  check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eduplay-teacher/package-lock.json
      - name: Install & check
        working-directory: eduplay-teacher
        run: |
          npm ci
          npx tsc --noEmit
      - name: Build check
        working-directory: eduplay-teacher
        env:
          VITE_API_URL: /api
        run: npm run build

  push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v5
        with:
          context: ./eduplay-teacher
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
