name: Primary Frontend — Build & Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'eduplay-primary/**'
      - '.github/workflows/primary.yml'
  pull_request:
    branches: [main]
    paths:
      - 'eduplay-primary/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/eduplay-primary

jobs:

  # ── Job 1: Type-check & lint ────────────────────────────────────────────────
  check:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eduplay-primary/package-lock.json

      - name: Install dependencies
        working-directory: eduplay-primary
        run: npm ci

      - name: TypeScript check
        working-directory: eduplay-primary
        run: npx tsc --noEmit

      - name: Build check
        working-directory: eduplay-primary
        env:
          VITE_API_URL: /api
        run: npm run build

  # ── Job 2: Build & push Docker image ────────────────────────────────────────
  push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./eduplay-primary
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
