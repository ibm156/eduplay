name: Eduplay CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./eduplay-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eduplay-backend:latest

      - name: Build & Push Primary Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./eduplay-primary
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eduplay-primary:latest