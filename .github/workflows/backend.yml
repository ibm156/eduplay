name: Backend — Test & Push

on:
  push:
    branches: [main, develop]
    paths:
      - 'eduplay-backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'eduplay-backend/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/eduplay-backend

jobs:

  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Django Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       eduplay_test
          POSTGRES_USER:     eduplay
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: eduplay-backend/requirements.docker.txt

      - name: Install dependencies
        working-directory: eduplay-backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.docker.txt
          pip install pytest pytest-django pytest-cov

      - name: Create test .env
        working-directory: eduplay-backend
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci-only
          DEBUG=True
          DATABASE_URL=postgresql://eduplay:testpassword@localhost:5432/eduplay_test
          ALLOWED_HOSTS=localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS=http://localhost
          EOF

      - name: Run migrations
        working-directory: eduplay-backend
        env:
          DATABASE_URL: postgresql://eduplay:testpassword@localhost:5432/eduplay_test
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
        run: |
          python manage.py makemigrations --noinput
          python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: eduplay-backend
        env:
          DATABASE_URL: postgresql://eduplay:testpassword@localhost:5432/eduplay_test
          SECRET_KEY: test-secret-key-for-ci-only
          DEBUG: "True"
        run: |
          pytest --cov=apps --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: eduplay-backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Job 2: Build & push Docker image ────────────────────────────────────────
  push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: ./eduplay-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post image digest
        run: echo "Pushed image digest ${{ steps.build-and-push.outputs.digest }}"
